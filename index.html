<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Drama China VIP</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
  }
  .header {
    position: sticky; top: 0; z-index: 100;
    background: #0f0f0f;
    padding: 12px 16px;
    border-bottom: 1px solid #222;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .search-row { display: flex; gap: 8px; }
  .search-row input {
    flex: 1; background: #1e1e1e;
    border: 1px solid #333; border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 14px; outline: none;
  }
  .search-row input::placeholder { color: #666; }
  .search-row button {
    background: #2196F3; color: #fff; border: none;
    border-radius: 10px; padding: 10px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 14px;
  }
  .card {
    background: #1a1a1a; border-radius: 12px;
    overflow: hidden; cursor: pointer;
    transition: transform 0.15s; position: relative;
  }
  .card:active { transform: scale(0.97); }

  /* Poster pakai div bergradien + teks, bukan <img> */
  .card-poster {
    width: 100%; aspect-ratio: 2/3;
    display: flex; align-items: flex-end;
    justify-content: center;
    background: linear-gradient(135deg, #1c1c2e, #2d2d44);
    position: relative; overflow: hidden;
  }
  .card-poster::before {
    content: "🎬";
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    font-size: 40px; opacity: 0.3;
  }
  /* Warna gradient unik per kartu */
  .card-poster[data-color="0"] { background: linear-gradient(135deg, #1a1a2e, #16213e); }
  .card-poster[data-color="1"] { background: linear-gradient(135deg, #2d1b2e, #1a0a1e); }
  .card-poster[data-color="2"] { background: linear-gradient(135deg, #0d2137, #0a3d62); }
  .card-poster[data-color="3"] { background: linear-gradient(135deg, #1b2838, #2a475e); }
  .card-poster[data-color="4"] { background: linear-gradient(135deg, #2e1a00, #4a2800); }

  /* Jika ada field img_url di JSON, tampilkan sebagai background */
  .card-poster img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .card-info { padding: 8px 10px 10px; }
  .card-title {
    font-size: 12px; font-weight: 600;
    color: #fff; line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .badge {
    position: absolute; top: 8px; left: 8px;
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 6px; z-index: 2;
  }
  .badge-free { background: #4CAF50; color: #fff; }
  .badge-vip  { background: #FFD700; color: #000; }
  .empty {
    text-align: center; padding: 60px 20px;
    color: #555; grid-column: 1/-1;
  }
  .empty span { font-size: 48px; display: block; margin-bottom: 12px; }
  .loading {
    text-align: center; padding: 40px;
    color: #666; grid-column: 1/-1; font-size: 14px;
  }
  .modal-overlay {
    display: none; position: fixed;
    inset: 0; background: rgba(0,0,0,0.85);
    z-index: 200; align-items: flex-end;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #1a1a1a; border-radius: 20px 20px 0 0;
    width: 100%; max-height: 85vh; overflow-y: auto;
    padding: 20px 16px 40px; animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-close {
    float: right; background: #333; border: none; color: #fff;
    border-radius: 50%; width: 30px; height: 30px;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
  .modal-desc  { font-size: 13px; color: #aaa; line-height: 1.6; margin-bottom: 16px; }
  .ep-list { display: flex; flex-direction: column; gap: 8px; }
  .ep-btn {
    display: flex; align-items: center; justify-content: space-between;
    background: #252525; border: none; border-radius: 10px;
    padding: 12px 14px; color: #fff; font-size: 13px;
    cursor: pointer; text-align: left; width: 100%;
  }
  .ep-btn:active { background: #333; }
  .ep-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
  .ep-free { background: #4CAF50; color: #fff; }
  .ep-vip  { background: #FFD700; color: #000; }
  .admin-panel { display: none; padding: 16px; }
  .admin-panel.show { display: block; }
  .admin-header { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .admin-card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .admin-card h3 { font-size: 14px; color: #aaa; margin-bottom: 12px; }
  .admin-stat { font-size: 28px; font-weight: 700; color: #2196F3; }
  .admin-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #2a2a2a; font-size: 13px;
  }
  .admin-row:last-child { border-bottom: none; }
  .admin-row .val { color: #aaa; }
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #111; border-top: 1px solid #222;
    display: flex; z-index: 150;
  }
  .nav-btn {
    flex: 1; padding: 12px 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    background: none; border: none; color: #555; font-size: 10px; cursor: pointer;
  }
  .nav-btn.active { color: #2196F3; }
  .nav-btn svg { width: 22px; height: 22px; }
  .content { padding-bottom: 70px; }
</style>
</head>
<body>

<div class="content" id="mainContent">
  <div class="header">
    <h1>🎬 Drama China</h1>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="cari judul..." oninput="filterDramas()">
      <button onclick="filterDramas()">Cari</button>
    </div>
  </div>
  <div class="grid" id="dramaGrid">
    <div class="loading">Memuat drama...</div>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-header">⚙️ Admin Panel</div>
  <div class="admin-card">
    <h3>Total Drama</h3>
    <div class="admin-stat" id="totalDramas">0</div>
  </div>
  <div class="admin-card">
    <h3>Statistik</h3>
    <div class="admin-row"><span>Drama Free</span><span class="val" id="totalFree">0</span></div>
    <div class="admin-row"><span>Drama VIP</span><span class="val" id="totalVip">0</span></div>
    <div class="admin-row"><span>Total Episode</span><span class="val" id="totalEps">0</span></div>
  </div>
  <div class="admin-card">
    <h3>Aksi Cepat</h3>
    <div class="admin-row">
      <span>Upload Drama Baru</span>
      <button onclick="openBot()" style="background:#2196F3;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Buka Bot</button>
    </div>
    <div class="admin-row">
      <span>Kelola Premium</span>
      <button onclick="openBot()" style="background:#2196F3;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Buka Bot</button>
    </div>
    <div class="admin-row">
      <span>Broadcast</span>
      <button onclick="openBot()" style="background:#2196F3;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Buka Bot</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="navHome" onclick="showTab('home')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Beranda
  </button>
  <button class="nav-btn" id="navSearch" onclick="showTab('search')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    Cari
  </button>
  <button class="nav-btn" id="navAdmin" onclick="showTab('admin')" style="display:none">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    Admin
  </button>
</nav>

<script>
const BOT_USERNAME = "DracinMembershipBot";
const ADMIN_ID = "6444305696";
const DRAMA_DB_URL = "./drama_db.json";

const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor('#0f0f0f'); }

const userId = tg?.initDataUnsafe?.user?.id?.toString() || "";
const isAdmin = userId === ADMIN_ID;
if (isAdmin) document.getElementById("navAdmin").style.display = "flex";

let allDramas = [];
let grouped   = {};

async function loadDramas() {
  try {
    const res  = await fetch(DRAMA_DB_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allDramas = Object.entries(data).map(([key, val]) => ({ key, ...val }));

    grouped = {};
    for (const ep of allDramas) {
      const name = ep.series_name || ep.drama_name || ep.key;
      if (!grouped[name]) grouped[name] = [];
      grouped[name].push(ep);
    }

    renderGrid(Object.entries(grouped));
    if (isAdmin) updateAdminStats();
  } catch (e) {
    document.getElementById("dramaGrid").innerHTML =
      `<div class="empty"><span>⚠️</span>Gagal memuat drama.<br><small>${e.message}</small></div>`;
  }
}

function makePoster(name, colorIdx, imgUrl) {
  // Jika ada img_url di JSON, tampilkan sebagai gambar
  const imgTag = imgUrl
    ? `<img src="${imgUrl}" alt="${name}" onerror="this.style.display='none'">`
    : "";
  return `<div class="card-poster" data-color="${colorIdx % 5}">${imgTag}</div>`;
}

function renderGrid(entries) {
  const grid = document.getElementById("dramaGrid");
  if (!entries.length) {
    grid.innerHTML = `<div class="empty"><span>🔍</span>Drama tidak ditemukan.</div>`;
    return;
  }

  grid.innerHTML = entries.map(([name, eps], i) => {
    const hasVip = eps.some(e => e.type === "vip");
    const badge  = hasVip
      ? `<div class="badge badge-vip">VIP</div>`
      : `<div class="badge badge-free">FREE</div>`;

    // Ambil img_url dari episode pertama jika ada
    const imgUrl = eps[0]?.img_url || "";
    const poster = makePoster(name, i, imgUrl);

    return `
      <div class="card" onclick="openDrama('${encodeURIComponent(name)}')">
        ${badge}
        ${poster}
        <div class="card-info">
          <div class="card-title">${name}</div>
        </div>
      </div>`;
  }).join("");
}

function filterDramas() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const entries = Object.entries(grouped).filter(([name]) =>
    !q || name.toLowerCase().includes(q)
  );
  renderGrid(entries);
}

function openDrama(encodedName) {
  const name = decodeURIComponent(encodedName);
  const eps  = grouped[name] || [];

  const epList = eps.map(ep => {
    const bc  = ep.type === "vip" ? "ep-vip" : "ep-free";
    const bt  = ep.type === "vip" ? "VIP" : "FREE";
    const qty = ep.quality ? ` · ${ep.quality}` : "";
    return `
      <button class="ep-btn" onclick="watchEpisode('${ep.key}')">
        <span>Episode ${ep.episode_num}${qty}</span>
        <span class="ep-badge ${bc}">${bt}</span>
      </button>`;
  }).join("");

  document.getElementById("modalBody").innerHTML = `
    <div class="modal-title">${name}</div>
    <div class="modal-desc">${eps.length} episode tersedia</div>
    <div class="ep-list">${epList}</div>
  `;
  document.getElementById("modalOverlay").classList.add("show");
}

function watchEpisode(key) {
  const link = `https://t.me/${BOT_USERNAME}?start=${key}`;
  if (tg) tg.openTelegramLink(link);
  else window.open(link, "_blank");
}

function closeModal(e) {
  if (!e || e.target === document.getElementById("modalOverlay")) {
    document.getElementById("modalOverlay").classList.remove("show");
  }
}

function updateAdminStats() {
  document.getElementById("totalDramas").textContent = Object.keys(grouped).length;
  document.getElementById("totalFree").textContent   = allDramas.filter(e => e.type === "free").length;
  document.getElementById("totalVip").textContent    = allDramas.filter(e => e.type === "vip").length;
  document.getElementById("totalEps").textContent    = allDramas.length;
}

function openBot() {
  const link = `https://t.me/${BOT_USERNAME}`;
  if (tg) tg.openTelegramLink(link);
  else window.open(link, "_blank");
}

function showTab(tab) {
  document.getElementById("mainContent").style.display = tab !== "admin" ? "block" : "none";
  document.getElementById("adminPanel").classList.toggle("show", tab === "admin");
  document.getElementById("navHome").classList.toggle("active",   tab === "home");
  document.getElementById("navSearch").classList.toggle("active", tab === "search");
  document.getElementById("navAdmin").classList.toggle("active",  tab === "admin");
  if (tab === "search") document.getElementById("searchInput").focus();
}

loadDramas();
</script>
</body>
</html>
